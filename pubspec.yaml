name: vn_date_time_picker
description: >-
  Customizable date, time, date-time and date range picker for Flutter.
  Vietnamese & English, haptic feedback, landscape layout, full theming.
version: 0.2.3
homepage: https://github.com/levangiac/-date-time-picker
repository: https://github.com/levangiac/-date-time-picker
issue_tracker: https://github.com/levangiac/-date-time-picker/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
topics:
  - date-picker
  - time-picker
  - calendar
  - date-range
  - ui

# Bỏ comment sau khi đã thêm đủ ảnh vào screenshots/ (xem screenshots/README.md)
screenshots:
  - description: "Date picker với infinite scroll và year grid"
    path: screenshots/date_picker.png
  - description: "Time picker dạng scroll wheel với haptic feedback"
    path: screenshots/time_picker.png
  - description: "Date-time picker dạng tab Date | Time"
    path: screenshots/date_time_picker.png
  - description: "Date range picker kiểu Google Calendar"
    path: screenshots/range_picker.png
  - description: "Year grid overlay"
    path: screenshots/year_grid.png
